name: Student Mark Calculator CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test Android App
    runs-on: ubuntu-latest

    steps:
      # Download the project files from the repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Install Java 17 for the Android Gradle build
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Prepare Gradle and cache dependencies
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Allow the Linux computer to execute gradlew
      - name: Give Gradle permission
        run: chmod +x gradlew

      # Run the Kotlin unit tests
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      # Build the Android debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Save the generated APK in GitHub Actions
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Student-Mark-Calculator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
