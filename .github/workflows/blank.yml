name: Student Mark Calculator CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test Android App
    runs-on: ubuntu-latest

    steps:
      # Downloads the repository onto the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Installs Java 17, which the Android build tools need.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Prepares Gradle and caches downloaded dependencies.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Gives Linux permission to run the Gradle wrapper.
      - name: Grant permission to Gradle
        run: chmod +x gradlew

      # Runs the Kotlin unit tests.
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      # Builds the debug APK.
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Saves the generated APK under the workflow results.
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Student-Mark-Calculator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
